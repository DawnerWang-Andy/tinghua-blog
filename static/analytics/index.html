<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>半开 · 访问统计</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#0f0f14;color:#c0c0c0;min-height:100vh}
.header{text-align:center;padding:3rem 1rem 2rem}
.header h1{font-size:2rem;font-weight:300;color:#e0dcd0;letter-spacing:.12em;margin-bottom:.4rem}
.header p{font-size:.82rem;color:#555}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;padding:0 2rem 2rem;max-width:900px;margin:0 auto}
.card{background:#15151d;border:1px solid #1e1e28;border-radius:10px;padding:1.8rem 1.2rem;text-align:center}
.card-value{font-size:2.8rem;font-weight:200;color:#e8c56d;font-variant-numeric:tabular-nums;line-height:1}
.card-label{font-size:.75rem;color:#555;margin-top:.8rem;letter-spacing:.1em}
.section{max-width:900px;margin:0 auto;padding:0 2rem 2.5rem}
.section-title{font-size:.8rem;color:#444;letter-spacing:.12em;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid #1a1a24}
table{width:100%;border-collapse:collapse}
td,th{text-align:left;padding:.55rem .6rem;border-bottom:1px solid #14141c}
th{color:#444;font-weight:400;font-size:.75rem;letter-spacing:.06em}
td{color:#999;font-size:.82rem;font-variant-numeric:tabular-nums}
td:first-child{color:#c0c0c0}
td:last-child{text-align:right}
.bar-wrap{display:flex;align-items:center;gap:.5rem}
.bar{display:inline-block;height:5px;background:#e8c56d;border-radius:3px;opacity:.45;min-width:2px}
.bar-num{color:#666;font-size:.8rem;white-space:nowrap}
.status{text-align:center;padding:2rem;color:#444;font-size:.75rem}
.status.err{color:#a04040}
nav{margin-top:2rem;text-align:center}
nav a{color:#555;text-decoration:none;font-size:.8rem}
nav a:hover{color:#888}
@media(max-width:600px){.cards{grid-template-columns:1fr 1fr;padding:0 1rem 1rem}.card{padding:1.2rem .8rem}.card-value{font-size:2rem}.section{padding:0 1rem 1.5rem}}
</style>
</head>
<body>
<div class="header">
  <h1>半开 · 访问统计</h1>
  <p id="updated"></p>
</div>
<div class="cards">
  <div class="card"><div class="card-value" id="total">—</div><div class="card-label">总访问量</div></div>
  <div class="card"><div class="card-value" id="today">—</div><div class="card-label">今日访问</div></div>
  <div class="card"><div class="card-value" id="pageCount">—</div><div class="card-label">页面数</div></div>
  <div class="card"><div class="card-value" id="dayCount">—</div><div class="card-label">统计天数</div></div>
</div>
<div class="section">
  <div class="section-title">今日各页面</div>
  <div id="todayPages"><div class="status">—</div></div>
</div>
<div class="section">
  <div class="section-title">全部页面排名</div>
  <div id="allPages"><div class="status">—</div></div>
</div>
<div class="section">
  <div class="section-title">每日趋势</div>
  <div id="daily"><div class="status">—</div></div>
</div>
<div class="status" id="stat">加载中…</div>
<nav><a href="/">← 返回首页</a></nav>
<script>
const PAGE_NAMES = {
  '/': '首页',
  '/novels/': '小说目录',
  '/novels/foreword/': '写在前面',
  '/scripts/': '剧本目录',
  '/scripts/nolan-screenplay/': '拍摄台本',
  '/scripts/chishui-screenplay/': '赤水·破局',
  '/about/': '关于',
  '/analytics/': '统计',
  '/search/': '搜索',
};

function pageName(path) {
  return PAGE_NAMES[path] || path;
}

function renderTable(container, entries, maxVal){
  if(!entries.length){ container.innerHTML='<div class="status">暂无数据</div>';return;}
  container.innerHTML='<table>'+entries.map(function(e){
    var name=pageName(e[0]), v=e[1];
    var barW=Math.max(v/maxVal*150,2);
    return '<tr><td>'+name+'</td><td><div class="bar-wrap"><span class="bar" style="width:'+barW+'px"></span><span class="bar-num">'+v.toLocaleString()+'</span></div></td></tr>';
  }).join('')+'</table>';
}

async function load(){
  var s=document.getElementById('stat');
  try{
    s.textContent='加载中…';s.className='status';
    var r=await fetch('/api/stats');
    if(!r.ok) throw new Error('HTTP '+r.status);
    var d=await r.json();
    document.getElementById('total').textContent=(d.total||0).toLocaleString();
    document.getElementById('today').textContent=(d.today||0).toLocaleString();
    var pages=Object.entries(d.pages||{}).sort(function(a,b){return b[1]-a[1]});
    document.getElementById('pageCount').textContent=pages.length;
    document.getElementById('dayCount').textContent=Object.keys(d.days||{}).length;
    var tp=d.pages_today||{};
    var tpe=Object.entries(tp).sort(function(a,b){return b[1]-a[1]});
    renderTable(document.getElementById('todayPages'),tpe,tpe.length?tpe[0][1]:1);
    renderTable(document.getElementById('allPages'),pages,pages.length?pages[0][1]:1);
    var days=Object.entries(d.days||{}).sort().reverse();
    renderTable(document.getElementById('daily'),days,days.length?Math.max.apply(null,days.map(function(x){return x[1]})):1);
    document.getElementById('updated').textContent='更新于 '+new Date().toLocaleTimeString('zh-CN',{hour12:false});
    s.textContent='自动刷新 · 每30秒';s.className='status';
  }catch(e){
    s.textContent='连接失败: '+e.message;s.className='status err';
  }
}
load();
setInterval(load,30000);
</script>
</body>
</html>

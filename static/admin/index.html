<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>半开 · 数据后台</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
         background: #f5f5f0; color: #222; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  header { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem;
           padding-bottom: 1.5rem; margin-bottom: 2rem; border-bottom: 1px solid #e0e0d8; }
  h1 { font-size: 1.7rem; font-weight: 600; }
  .meta { font-size: .82rem; color: #888; margin-top: .3rem; }
  .meta span { margin-right: 1rem; }
  .actions button { font-size: .85rem; padding: .5rem 1rem; border-radius: 6px; cursor: pointer; border: 0; margin-left: .5rem; }
  .reload-btn { background: #222; color: #fff; }
  .reload-btn:hover { background: #000; }
  .logout-btn { background: transparent; color: #c00; }
  .logout-btn:hover { background: #fee; }

  h2.section-title { font-size: .95rem; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .08em;
                     margin: 2rem 0 1rem; padding-left: .5rem; border-left: 3px solid #222; }

  .grid { display: grid; gap: 1.2rem; }
  .grid-4 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); }

  .card { background: #fff; border-radius: 12px; padding: 1.3rem 1.4rem; box-shadow: 0 2px 12px rgba(0,0,0,.04); position: relative; }
  .card-label { font-size: .75rem; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .4rem; }
  .card-value { font-size: 2.2rem; font-weight: 600; line-height: 1.1; letter-spacing: -0.02em; }
  .card-sub { font-size: .82rem; color: #666; margin-top: .4rem; min-height: 1.2em; }
  .delta-up { color: #1e7e34; } .delta-down { color: #c00; } .delta-flat { color: #888; }

  .section { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,.04); }
  .section h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
  .section h3 .hint { font-size: .75rem; font-weight: 400; color: #999; }

  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th, td { text-align: left; padding: .55rem .4rem; border-bottom: 1px solid #f0f0e8; }
  th { font-weight: 500; color: #888; font-size: .75rem; text-transform: uppercase; letter-spacing: .03em; }
  td a { color: #222; text-decoration: none; border-bottom: 1px dotted #888; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
  td.mono { font-family: ui-monospace, SFMono-Regular, monospace; font-size: .8rem; color: #555; }
  .empty { color: #999; font-style: italic; padding: 1.5rem 0; text-align: center; }
  .error-inline { background: #fee; color: #c00; padding: .6rem .8rem; border-radius: 6px; font-size: .82rem; }
  .err-banner { background: #fee; color: #c00; padding: .8rem 1rem; border-radius: 8px; margin-bottom: 1rem; }

  .chart { display: flex; align-items: flex-end; gap: 3px; height: 110px; padding-top: 1.5rem; }
  .bar { flex: 1; background: linear-gradient(to top, #2c2c2c 0%, #6c6c6c 100%); border-radius: 2px 2px 0 0;
         min-height: 2px; position: relative; cursor: pointer; transition: opacity .15s; }
  .bar:hover { opacity: .7; }
  .bar:hover::after { content: attr(data-label); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
                      background: #222; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: .72rem;
                      white-space: nowrap; margin-bottom: 4px; z-index: 10; pointer-events: none; }
  .x-axis { display: flex; gap: 3px; margin-top: .4rem; font-size: .68rem; color: #aaa; }
  .x-axis span { flex: 1; text-align: center; }

  .pill { display: inline-block; padding: .15rem .55rem; border-radius: 10px; font-size: .7rem; font-weight: 500; }
  .pill-ok { background: #e6f4ea; color: #1e7e34; }
  .pill-warn { background: #fff3cd; color: #856404; }
  .pill-err { background: #fee; color: #c00; }

  .health-grid { display: grid; gap: .6rem; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
  .health-item { background: #fafaf5; padding: .8rem 1rem; border-radius: 8px; font-size: .85rem; display: flex; justify-content: space-between; align-items: center; }
  .health-item .path { color: #555; font-family: ui-monospace, monospace; font-size: .8rem; }
  .health-item .latency { font-weight: 500; }

  .loading { color: #999; padding: 3rem; text-align: center; }
  details { margin-top: 1rem; }
  summary { cursor: pointer; color: #666; font-size: .85rem; padding: .4rem 0; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>半开 · 数据后台</h1>
      <div class="meta">
        <span id="meta-time">加载中…</span>
        <span id="meta-api"></span>
      </div>
    </div>
    <div class="actions">
      <button class="reload-btn" onclick="load()">刷新</button>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </header>

  <div id="error-banner"></div>

  <h2 class="section-title">📊 访问流量</h2>
  <div id="traffic-cards" class="grid grid-4"><div class="loading">加载中…</div></div>

  <div class="grid grid-2" style="margin-top: 1.2rem;">
    <div class="section">
      <h3>30 天 PV 趋势 <span class="hint" id="pv-trend-hint"></span></h3>
      <div id="chart-pv"></div>
    </div>
    <div class="section">
      <h3>🌍 访客地区分布</h3>
      <div id="country-list"></div>
    </div>
  </div>

  <div class="section" style="margin-top: 1.2rem;">
    <h3>🔥 热门页面 Top 10（按 PV）</h3>
    <div id="pv-top-pages"></div>
  </div>

  <h2 class="section-title">⚡ 站点健康</h2>
  <div id="health-section"><div class="loading">加载中…</div></div>

  <h2 class="section-title">📊 内容概览</h2>
  <div id="overview-cards" class="grid grid-4"><div class="loading">加载中…</div></div>

  <h2 class="section-title">📖 章节字数分布</h2>
  <div class="section" id="chapter-section"><div class="loading">加载中…</div></div>

  <h2 class="section-title">💬 评论分析</h2>
  <div class="grid grid-2">
    <div class="section">
      <h3>30 天趋势 <span class="hint" id="trend-hint"></span></h3>
      <div id="chart-comments"></div>
    </div>
    <div class="section">
      <h3>24 小时活跃分布 <span class="hint">按本地时间</span></h3>
      <div id="chart-hours"></div>
    </div>
  </div>

  <div class="grid grid-2" style="margin-top: 1.2rem;">
    <div class="section">
      <h3>🔥 热门页面</h3>
      <div id="top-pages"></div>
    </div>
    <div class="section">
      <h3>👤 活跃评论者</h3>
      <div id="top-users"></div>
    </div>
  </div>

  <h2 class="section-title">💬 最近评论</h2>
  <div class="section" id="recent-section"></div>

  <h2 class="section-title">🚀 部署历史</h2>
  <div class="section" id="deploy-section"></div>
</div>

<script>
async function load() {
  const banner = document.getElementById('error-banner');
  banner.innerHTML = '';
  try {
    const r = await fetch('/api/admin/stats', { cache: 'no-cache' });
    if (r.status === 401) { location.href = '/admin/login/'; return; }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    render(d);
  } catch (e) {
    banner.innerHTML = '<div class="err-banner">数据加载失败: ' + esc(e.message || e) + ' <button class="reload-btn" onclick="load()">重试</button></div>';
  }
}

function render(d) {
  const t = new Date(d.generated_at);
  document.getElementById('meta-time').textContent = '生成于 ' + t.toLocaleString('zh-CN');
  document.getElementById('meta-api').textContent = 'API ' + (d.api_ms || 0) + 'ms';

  renderTraffic(d.traffic);
  renderHealth(d.health);
  renderOverview(d);
  renderChapters(d.novel);
  renderCommentChart(d.comments);
  renderHourChart(d.comments);
  renderTopPages(d.comments);
  renderTopUsers(d.comments);
  renderRecent(d.comments);
  renderDeploy(d.deploy);
}

function renderTraffic(t) {
  const cards = document.getElementById('traffic-cards');
  cards.innerHTML = '';
  if (!t?.ok) {
    cards.innerHTML = '<div class="error-inline" style="grid-column:1/-1">流量数据不可用: ' + esc(t?.error || '未知') + '</div>';
    document.getElementById('chart-pv').innerHTML = '<div class="empty">暂无数据</div>';
    document.getElementById('country-list').innerHTML = '<div class="empty">暂无数据</div>';
    document.getElementById('pv-top-pages').innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }
  cards.appendChild(card('总访问量', fmt(t.total), '历史累计 PV', true));
  cards.appendChild(card('今日 PV', fmt(t.today), deltaText(t.today, t.yesterday, t.day_delta_pct), true));
  cards.appendChild(card('独立访客', fmt(t.unique_visitors), '按 IP 去重', true));
  cards.appendChild(card('本周 PV', fmt(t.week), '近 7 天累计', true));

  // 30 天 PV 趋势
  const days = []; const map = {};
  for (let i = 29; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    days.push(k); map[k] = 0;
  }
  (t.by_day || []).forEach(x => { if (map[x.day] !== undefined) map[x.day] = x.count; });
  const max = Math.max(...Object.values(map), 1);
  document.getElementById('pv-trend-hint').textContent = '共 ' + sumBy(t.by_day || [], 'count') + ' 次';
  let chart = '<div class="chart">';
  days.forEach(k => {
    const h = (map[k] / max * 100) || 1;
    chart += '<div class="bar" style="height:' + h + '%" data-label="' + k + ': ' + map[k] + '"></div>';
  });
  chart += '</div><div class="x-axis"><span>' + days[0].slice(5) + '</span><span></span><span>' + days[14].slice(5) + '</span><span></span><span>' + days[29].slice(5) + '</span></div>';
  document.getElementById('chart-pv').innerHTML = chart;

  // 国家分布
  const countryBox = document.getElementById('country-list');
  if (!t.by_country?.length) { countryBox.innerHTML = '<div class="empty">暂无访客</div>'; }
  else {
    let html = '<table><tr><th>地区</th><th class="num">访问</th></tr>';
    t.by_country.forEach(c => {
      html += '<tr><td>' + flagOf(c.country) + ' ' + esc(c.country) + '</td><td class="num">' + c.count + '</td></tr>';
    });
    html += '</table>';
    countryBox.innerHTML = html;
  }

  // PV 热门页
  const topBox = document.getElementById('pv-top-pages');
  if (!t.top_pages?.length) { topBox.innerHTML = '<div class="empty">暂无访问</div>'; }
  else {
    let html = '<table><tr><th>页面</th><th class="num">访问数</th></tr>';
    t.top_pages.forEach(p => {
      html += '<tr><td><a href="' + esc(p.url) + '" target="_blank">' + esc(p.url) + '</a></td><td class="num">' + p.count + '</td></tr>';
    });
    html += '</table>';
    topBox.innerHTML = html;
  }
}

function flagOf(code) {
  if (!code || code === '??' || code.length !== 2) return '🌐';
  // 国家代码转 emoji 国旗
  const cp = [...code.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65);
  return String.fromCodePoint(...cp);
}

function renderHealth(h) {
  const box = document.getElementById('health-section');
  if (!h?.ok || !h.probes) { box.innerHTML = '<div class="error-inline">健康数据不可用</div>'; return; }
  let html = '<div class="health-grid">';
  h.probes.forEach(p => {
    const ok = p.status === 200;
    const slow = p.ms > 2000;
    const pill = ok && !slow ? 'pill-ok' : (slow ? 'pill-warn' : 'pill-err');
    const label = ok ? (slow ? '慢' : '正常') : (p.status || 'ERR');
    html += '<div class="health-item">'
         + '<span class="path">' + esc(p.path || '?') + '</span>'
         + '<span><span class="latency">' + (p.ms ?? '–') + 'ms</span> <span class="pill ' + pill + '">' + label + '</span></span>'
         + '</div>';
  });
  html += '</div>';
  box.innerHTML = html;
}

function renderOverview(d) {
  const c = d.comments || {}, n = d.novel || {};
  const box = document.getElementById('overview-cards');
  box.innerHTML = '';
  box.appendChild(card('评论总数', c.ok ? c.total : '—', c.ok ? (c.pending ? '待审 ' + c.pending : '已通过审核') : c.error, c.ok));
  box.appendChild(card('独立评论者', c.ok ? c.unique_users : '—', c.ok ? '人均 ' + (c.unique_users ? (c.total / c.unique_users).toFixed(1) : 0) + ' 条' : '—', c.ok));
  box.appendChild(card('本周评论', c.ok ? c.this_week : '—', c.ok ? deltaText(c.this_week, c.last_week, c.week_delta_pct) : '—', c.ok));
  box.appendChild(card('评论平均字数', c.ok ? c.avg_length : '—', c.ok ? '总计 ' + fmt(c.total_chars) + ' 字' : '—', c.ok));
  box.appendChild(card('已发布章节', n.ok ? n.published : '—', n.ok ? '/ ' + n.total_chapters + ' 章' : '—', n.ok));
  box.appendChild(card('小说总字数', n.ok ? fmt(n.total_chars) : '—', n.ok ? '均章 ' + fmt(n.avg_chars) + ' 字' : '—', n.ok));
  box.appendChild(card('有评论页面', c.ok ? c.pages : '—', c.ok ? '篇' : '—', c.ok));
  box.appendChild(card('30 天评论', c.ok ? sumBy(c.by_day, 'count') : '—', c.ok ? '日均 ' + (sumBy(c.by_day, 'count') / 30).toFixed(1) : '—', c.ok));
}

function deltaText(now, prev, pct) {
  if (!prev && !now) return '上周也是 0';
  if (pct === null) return '上周 ' + prev;
  const cls = pct > 0 ? 'delta-up' : (pct < 0 ? 'delta-down' : 'delta-flat');
  const sign = pct > 0 ? '↑' : (pct < 0 ? '↓' : '→');
  return '<span class="' + cls + '">' + sign + ' ' + Math.abs(pct) + '%</span> 较上周';
}

function renderChapters(n) {
  const box = document.getElementById('chapter-section');
  if (!n?.ok || !n.chapters?.length) { box.innerHTML = '<div class="empty">暂无章节数据</div>'; return; }
  const max = Math.max(...n.chapters.map(c => c.chars), 1);
  let html = '<div class="chart" style="height:80px">';
  n.chapters.forEach(c => {
    const h = (c.chars / max * 100) || 1;
    html += '<div class="bar" style="height:' + h + '%" data-label="第' + c.chapter + '章: ' + fmt(c.chars) + '字"></div>';
  });
  html += '</div><div class="x-axis">';
  n.chapters.forEach(c => { html += '<span>' + c.chapter + '</span>'; });
  html += '</div>';
  box.innerHTML = html;
}

function renderCommentChart(c) {
  const box = document.getElementById('chart-comments');
  if (!c?.ok) { box.innerHTML = '<div class="error-inline">' + esc(c?.error || '不可用') + '</div>'; return; }
  const days = []; const map = {};
  for (let i = 29; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    days.push(k); map[k] = 0;
  }
  (c.by_day || []).forEach(x => { if (map[x.day] !== undefined) map[x.day] = x.count; });
  const max = Math.max(...Object.values(map), 1);
  document.getElementById('trend-hint').textContent = '共 ' + sumBy(c.by_day || [], 'count') + ' 条';
  let html = '<div class="chart">';
  days.forEach(k => {
    const h = (map[k] / max * 100) || 1;
    html += '<div class="bar" style="height:' + h + '%" data-label="' + k + ': ' + map[k] + '"></div>';
  });
  html += '</div><div class="x-axis"><span>' + days[0].slice(5) + '</span><span></span><span>' + days[14].slice(5) + '</span><span></span><span>' + days[29].slice(5) + '</span></div>';
  box.innerHTML = html;
}

function renderHourChart(c) {
  const box = document.getElementById('chart-hours');
  if (!c?.ok) { box.innerHTML = '<div class="error-inline">' + esc(c?.error || '不可用') + '</div>'; return; }
  const map = {}; for (let h = 0; h < 24; h++) map[h] = 0;
  (c.by_hour || []).forEach(x => { map[x.hour] = x.count; });
  const max = Math.max(...Object.values(map), 1);
  let html = '<div class="chart">';
  for (let h = 0; h < 24; h++) {
    const v = map[h], pct = (v / max * 100) || 1;
    html += '<div class="bar" style="height:' + pct + '%" data-label="' + h + ':00 - ' + v + '"></div>';
  }
  html += '</div><div class="x-axis"><span>0</span><span>6</span><span>12</span><span>18</span><span>23</span></div>';
  box.innerHTML = html;
}

function renderTopPages(c) {
  const box = document.getElementById('top-pages');
  if (!c?.ok) { box.innerHTML = '<div class="error-inline">' + esc(c?.error || '不可用') + '</div>'; return; }
  if (!c.top_pages?.length) { box.innerHTML = '<div class="empty">还没有评论</div>'; return; }
  let html = '<table><tr><th>页面</th><th class="num">评论数</th></tr>';
  c.top_pages.forEach(p => {
    html += '<tr><td><a href="' + esc(p.url) + '" target="_blank">' + esc(p.url) + '</a></td><td class="num">' + p.count + '</td></tr>';
  });
  html += '</table>';
  box.innerHTML = html;
}

function renderTopUsers(c) {
  const box = document.getElementById('top-users');
  if (!c?.ok) { box.innerHTML = '<div class="error-inline">' + esc(c?.error || '不可用') + '</div>'; return; }
  if (!c.top_users?.length) { box.innerHTML = '<div class="empty">还没有评论者</div>'; return; }
  let html = '<table><tr><th>昵称</th><th class="num">评论数</th></tr>';
  c.top_users.forEach(u => {
    html += '<tr><td>' + esc(u.nick) + '</td><td class="num">' + u.count + '</td></tr>';
  });
  html += '</table>';
  box.innerHTML = html;
}

function renderRecent(c) {
  const box = document.getElementById('recent-section');
  if (!c?.ok) { box.innerHTML = '<div class="error-inline">' + esc(c?.error || '不可用') + '</div>'; return; }
  if (!c.recent?.length) { box.innerHTML = '<div class="empty">还没有人评论</div>'; return; }
  let html = '<table><tr><th>时间</th><th>昵称</th><th>页面</th><th>内容</th></tr>';
  c.recent.forEach(x => {
    const tm = new Date(x.created_at).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    html += '<tr><td class="mono">' + tm + '</td><td>' + esc(x.nick) + '</td>'
         + '<td><a href="' + esc(x.url) + '" target="_blank">' + esc(x.url) + '</a></td>'
         + '<td>' + esc(x.content) + '</td></tr>';
  });
  html += '</table>';
  box.innerHTML = html;
}

function renderDeploy(dp) {
  const box = document.getElementById('deploy-section');
  if (!dp?.ok) { box.innerHTML = '<div class="error-inline">' + esc(dp?.error || '不可用') + '</div>'; return; }
  if (!dp.commits?.length) { box.innerHTML = '<div class="empty">无部署记录</div>'; return; }
  let html = '<table><tr><th>时间</th><th>SHA</th><th>提交信息</th></tr>';
  dp.commits.forEach(c => {
    const tm = new Date(c.date).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    html += '<tr><td class="mono">' + tm + '</td><td class="mono">' + esc(c.sha) + '</td><td>' + esc(c.message) + '</td></tr>';
  });
  html += '</table>';
  box.innerHTML = html;
}

function card(label, value, sub, ok) {
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = '<div class="card-label">' + label + '</div>'
               + '<div class="card-value">' + (ok ? value : '<span style="font-size:1rem;color:#c00">异常</span>') + '</div>'
               + '<div class="card-sub">' + (sub || '') + '</div>';
  return el;
}

function sumBy(arr, key) { return (arr || []).reduce((s, x) => s + (x[key] || 0), 0); }
function fmt(n) { return (n || 0).toLocaleString('zh-CN'); }
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

async function logout() {
  await fetch('/api/admin/login', { method: 'DELETE' });
  location.href = '/admin/login/';
}

load();
setInterval(load, 60000);
</script>
</body>
</html>

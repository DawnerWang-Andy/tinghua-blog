<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>半开 · 后台登录</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
         background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: #fff; padding: 3rem 2.5rem; border-radius: 12px;
               box-shadow: 0 8px 32px rgba(0,0,0,.08); width: 100%; max-width: 360px; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: .5rem; color: #222; }
  p.subtitle { color: #888; font-size: .9rem; margin-bottom: 2rem; }
  input[type=password] { width: 100%; padding: .8rem 1rem; border: 1px solid #ddd;
                         border-radius: 8px; font-size: 1rem; outline: none; transition: border .2s; }
  input[type=password]:focus { border-color: #222; }
  button { width: 100%; margin-top: 1rem; padding: .8rem; background: #222; color: #fff;
           border: 0; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background .2s; }
  button:hover { background: #000; }
  button:disabled { background: #999; cursor: wait; }
  .error { color: #c00; font-size: .85rem; margin-top: .8rem; min-height: 1.2em; }
  .footer { text-align: center; margin-top: 1.5rem; font-size: .8rem; color: #aaa; }
</style>
</head>
<body>
<div class="login-box">
  <h1>半开 · 数据后台</h1>
  <p class="subtitle">输入管理员密码继续</p>
  <form id="f">
    <input type="password" id="pw" placeholder="密码" autocomplete="current-password" autofocus required>
    <button type="submit" id="btn">登录</button>
    <div class="error" id="err"></div>
  </form>
  <div class="footer">仅站长可访问</div>
</div>
<script>
const f = document.getElementById('f'), btn = document.getElementById('btn'), err = document.getElementById('err');
f.addEventListener('submit', async e => {
  e.preventDefault();
  btn.disabled = true; btn.textContent = '验证中…'; err.textContent = '';
  try {
    const r = await fetch('/api/admin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('pw').value })
    });
    const d = await r.json();
    if (r.ok) { location.href = '/admin/'; }
    else { err.textContent = d.error || '登录失败'; btn.disabled = false; btn.textContent = '登录'; }
  } catch (e) {
    err.textContent = '网络异常，请重试'; btn.disabled = false; btn.textContent = '登录';
  }
});
</script>
</body>
</html>

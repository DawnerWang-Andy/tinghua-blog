{{ if not .Params.image }}
<meta property="og:image" content="https://bankai-5ss.pages.dev/images/qq-poster-20260606.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://bankai-5ss.pages.dev/images/qq-poster-20260606.png">
{{ end }}
<script>
(function(){
  // 使用 sendBeacon 优先，失败回退 fetch keepalive
  // 不阻塞页面、不在意结果、出错绝对静默
  try {
    var data = JSON.stringify({ url: location.pathname });
    var ok = false;
    if (navigator.sendBeacon) {
      ok = navigator.sendBeacon('/api/pv', new Blob([data], { type: 'application/json' }));
    }
    if (!ok) {
      fetch('/api/pv', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: data,
        keepalive: true
      }).catch(function(){});
    }
  } catch(_) {}
})();
</script>
